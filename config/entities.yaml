# Per-entity overrides applied by scripts/introspect.py at codegen time.
#
# Keys per entity (by GraphQL type name):
#   tier:              block_cursor | field_cursor | full_rescan | dual
#   cursor_field:      GraphQL field name used as the incremental cursor
#   mutable:           true|false  (block_cursor REQUIRES mutable:false — INV-2)
#   deletable:         true|false  (false skips the reconcile id-diff for this entity)
#   version_field:     upstream monotonic field for ReplacingMergeTree(version)
#   ts_field/block_field: override auto-detected creation ts / block field
#   ts_immutable:      true  -> allow PARTITION BY toStartOfMonth(toDateTime(ts))
#   partition:         explicit ClickHouse PARTITION BY expression
#   rescan_interval_s: full-rescan / dual rescan cadence
#   enabled:           include this entity (default true)
#
# Tiers reflect the verified field inventory. Partitioning: pure block_cursor
# partitions by intDiv(block_number,1e6) (immutable creation block); everything
# else unpartitioned (immutable, dedup-safe). Unlisted entities default to
# full_rescan / mutable:true / unpartitioned.
#
# deletable is OPT-IN (defaults.deletable=false): the source exposes no delete
# signal, so delete-detection is a full id-walk (expensive). Only entities that
# can actually delete upstream are marked deletable:true; append-only on-chain
# logs and the huge tables (transfer/transaction/transaction_action) stay false
# so reconcile never walks them. Use "measure then flip": run
# `reconcile --entities X`; if it tombstones >0 rows, set deletable:true.

defaults:
  rescan_interval_s: 300
  enabled: true
  deletable: false        # opt-in; only mutable/lifecycle entities set deletable:true below

entities:
  # ── block_cursor: immutable, append-only event logs ──────────────────────
  Transfer:
    tier: block_cursor
    cursor_field: blockNumber
    mutable: false
  Transaction:
    tier: block_cursor
    cursor_field: blockNumber
    mutable: false

  # ── dual: block-bearing but mutable (block discovery + periodic full rescan)
  Avatar:
    tier: dual
    cursor_field: blockNumber
    mutable: true
    rescan_interval_s: 3600
  Token:
    tier: dual
    cursor_field: blockNumber
    mutable: true
    rescan_interval_s: 3600
  TrustRelation:
    tier: dual
    cursor_field: blockNumber
    mutable: true
    rescan_interval_s: 7200
    field_types:
      expiryTime: UInt256   # uses the uint256-max "never expires" sentinel; overflows Int256
  GuardianModule:
    tier: dual
    cursor_field: blockNumber
    mutable: true
    rescan_interval_s: 1800

  # ── field_cursor: monotonic field that is set at creation and advances on update
  Cashback:
    tier: field_cursor
    cursor_field: lastStatusUpdate
    mutable: true
    deletable: true
  AvatarBalance:
    tier: field_cursor
    cursor_field: lastCalculated
    mutable: true
    deletable: true
  AvatarTotalBalanceV2:
    tier: field_cursor
    cursor_field: lastPendingUpdate
    mutable: true
    deletable: true
  Profile:
    tier: field_cursor
    cursor_field: lastUpdatedBlockNumber
    mutable: true
    deletable: true
  CashbackStatusHistory:
    tier: field_cursor
    cursor_field: timestamp
    mutable: false
  Notification:
    tier: field_cursor
    cursor_field: timestamp
    mutable: false
  Metri_Pay_DelayModuleOwner:
    tier: field_cursor
    cursor_field: timestamp
    mutable: false
  TransactionAction:        # very large (~200M) append-only action log
    tier: field_cursor
    cursor_field: timestamp
    mutable: false
    ts_field: timestamp
    ts_immutable: true                       # PARTITION BY toStartOfMonth(toDateTime(timestamp))
    order_by: "avatar_id, timestamp, id"     # avatar-centric + time-range primary index (id keeps it unique)
    indexes:
      - {name: idx_ta_txn, expr: transaction_id, type: bloom_filter, granularity: 4}
      - {name: idx_ta_ts,  expr: timestamp,      type: minmax,       granularity: 4}

  # ── full_rescan mutable/lifecycle: deletable:true (small; cheap reconcile) ──
  Swap:                     # status flips Open->Filled in place; no usable cursor
    tier: full_rescan
    mutable: true
    rescan_interval_s: 1800
    deletable: true
  CirclesBacking:           # lifecycle (initiated->completed); completedAt null until done
    tier: full_rescan
    mutable: true
    deletable: true
  Metri_Pay_DelayModule:    # lastTransactionTimestamp may be null at creation
    tier: full_rescan
    mutable: true
    deletable: true
  Metri_Pay_RolesModule:    # lastSpentAt null until first spend
    tier: full_rescan
    mutable: true
    deletable: true
  # full_rescan (tier defaults to full_rescan), marked deletable so reconcile covers them:
  AutoTopup:
    deletable: true
  CoordinatorState:
    deletable: true
  EarnedFromInvite:
    deletable: true
  GnosisAppUser:
    deletable: true
  HistoricalGNOBalance:
    deletable: true
  InvestmentAccount:
    deletable: true
  Metri_Balance:
    deletable: true
  Metri_Order:
    deletable: true
  PendingRecovery:
    deletable: true
  V1TokenPendingStop:
    deletable: true
  # Left deletable:false (default) — append-only logs + large dual entities that
  # update-in-place rather than delete (rescan catches changes): Transfer, Transaction,
  # TransactionAction, CashbackStatusHistory, Notification, Metri_Pay_DelayModuleOwner,
  # Avatar, Token, TrustRelation, GuardianModule. Flip to true only if measured to delete.
